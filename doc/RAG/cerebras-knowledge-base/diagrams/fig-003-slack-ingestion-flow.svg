<svg viewBox="0 0 840 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans TC', sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #f8fafc; }
      .subtitle { font-size: 11px; fill: #94a3b8; }
      .box-title { font-size: 12px; font-weight: 600; fill: #f1f5f9; }
      .box-desc { font-size: 10px; fill: #94a3b8; }
      .arrow { stroke: #38bdf8; stroke-width: 1.5; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="35" class="title">Slack Socket 模式即時處理與蒸餾流程 (Slack Ingestion &amp; Distillation Flow)</text>
  <text x="30" y="55" class="subtitle">Real-time WebSocket event ingestion, thread re-fetching, LLM distillation and vector creation</text>

  <!-- Step 1: Socket Event -->
  <g transform="translate(30, 180)">
    <rect width="130" height="65" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="65" y="28" class="box-title" text-anchor="middle">Socket 事件</text>
    <text x="65" y="46" class="box-desc" text-anchor="middle">即時 WebSocket 推播</text>
  </g>

  <line x1="160" y1="212" x2="210" y2="212" class="arrow"/>

  <!-- Step 2: Route Decision -->
  <g transform="translate(215, 172)">
    <polygon points="40,0 80,40 40,80 0,40" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="40" y="44" class="box-title" fill="#fbbf24" text-anchor="middle">路由</text>
  </g>

  <!-- Branch 1: Bot Reply (@mention/DM) -->
  <line x1="255" y1="172" x2="255" y2="105" class="arrow"/>
  <line x1="255" y1="105" x2="310" y2="105" class="arrow"/>
  <g transform="translate(315, 80)">
    <rect width="160" height="50" rx="6" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
    <text x="80" y="22" class="box-title" text-anchor="middle">機器人即時回覆</text>
    <text x="80" y="38" class="box-desc" text-anchor="middle">@Mention 或私訊</text>
  </g>

  <!-- Branch 2: Tracked Channel Thread -->
  <line x1="295" y1="212" x2="315" y2="212" class="arrow"/>
  <g transform="translate(320, 180)">
    <rect width="160" height="65" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
    <text x="80" y="28" class="box-title" text-anchor="middle">重新攝取討論串</text>
    <text x="80" y="46" class="box-desc" text-anchor="middle">拉取父訊息與全體回覆</text>
  </g>

  <line x1="480" y1="212" x2="520" y2="212" class="arrow"/>

  <!-- Step 3: Upsert Thread -->
  <g transform="translate(525, 180)">
    <rect width="140" height="65" rx="6" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="70" y="28" class="box-title" text-anchor="middle">更新討論串紀錄</text>
    <text x="70" y="46" class="box-desc" text-anchor="middle">Upsert Thread (Postgres)</text>
  </g>

  <line x1="665" y1="212" x2="695" y2="212" class="arrow"/>

  <!-- Step 4: Sync Worker & Outputs -->
  <g transform="translate(700, 100)">
    <rect width="115" height="230" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#0284c7" stroke-width="1.5"/>
    <text x="57" y="25" class="box-title" fill="#38bdf8" text-anchor="middle">同步工作程式</text>
    
    <g transform="translate(10, 40)"><rect width="95" height="45" rx="4" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1"/><text x="47" y="20" class="box-title" text-anchor="middle">LLM 蒸餾</text><text x="47" y="34" class="box-desc" text-anchor="middle">摘要/問題/解答</text></g>
    <g transform="translate(10, 100)"><rect width="95" height="45" rx="4" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1"/><text x="47" y="20" class="box-title" text-anchor="middle">討論串向量</text><text x="47" y="34" class="box-desc" text-anchor="middle">Thread Vector</text></g>
    <g transform="translate(10, 160)"><rect width="95" height="45" rx="4" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1"/><text x="47" y="20" class="box-title" text-anchor="middle">爆發向量</text><text x="47" y="34" class="box-desc" text-anchor="middle">Burst Vectors</text></g>
  </g>
</svg>
