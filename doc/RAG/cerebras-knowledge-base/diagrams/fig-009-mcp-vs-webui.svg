<svg viewBox="0 0 840 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans TC', sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #f8fafc; }
      .subtitle { font-size: 11px; fill: #94a3b8; }
      .box-title { font-size: 12px; font-weight: 600; fill: #f1f5f9; }
      .box-desc { font-size: 10px; fill: #94a3b8; }
      .arrow { stroke: #38bdf8; stroke-width: 1.5; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="35" class="title">MCP 客戶端與 Web UI 的架構對比 (MCP vs Web UI Architecture)</text>
  <text x="30" y="55" class="subtitle">MCP exposes atomic retrieval primitives, while Web UI wraps them in a complete agent pipeline</text>

  <!-- Left Side: MCP Client -->
  <g transform="translate(40, 80)">
    <rect width="360" height="290" rx="8" fill="rgba(8, 51, 68, 0.4)" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="180" y="30" class="box-title" fill="#38bdf8" text-anchor="middle">MCP 客戶端 (MCP Client / Claude Code)</text>

    <g transform="translate(40, 55)">
      <rect width="280" height="50" rx="6" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1"/>
      <text x="140" y="22" class="box-title" text-anchor="middle">1. 直接呼叫檢索原語工具</text>
      <text x="140" y="38" class="box-desc" text-anchor="middle">Direct Primitive Tool Calls (search_slack, etc.)</text>
    </g>
    <line x1="180" y1="105" x2="180" y2="125" class="arrow"/>
    <g transform="translate(40, 130)">
      <rect width="280" height="50" rx="6" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1"/>
      <text x="140" y="22" class="box-title" text-anchor="middle">2. 取得原始證據列</text>
      <text x="140" y="38" class="box-desc" text-anchor="middle">Raw Evidence Rows (Fast &amp; Cheap)</text>
    </g>
    <line x1="180" y1="180" x2="180" y2="200" class="arrow"/>
    <g transform="translate(40, 205)">
      <rect width="280" height="50" rx="6" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1"/>
      <text x="140" y="22" class="box-title" text-anchor="middle">3. 由 Client 端主導 Agent 邏輯</text>
      <text x="140" y="38" class="box-desc" text-anchor="middle">Client Orchestrates Execution &amp; Decisions</text>
    </g>
  </g>

  <!-- Right Side: Web UI -->
  <g transform="translate(440, 80)">
    <rect width="360" height="290" rx="8" fill="rgba(76, 29, 149, 0.3)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="180" y="30" class="box-title" fill="#a78bfa" text-anchor="middle">Web UI 端到端 AI 代理 (Web UI Agent)</text>

    <g transform="translate(40, 55)">
      <rect width="280" height="50" rx="6" fill="#3b0764" stroke="#a78bfa" stroke-width="1"/>
      <text x="140" y="22" class="box-title" text-anchor="middle">1. 規劃器 (Planner Step)</text>
      <text x="140" y="38" class="box-desc" text-anchor="middle">LLM 剖析問題並選擇最適合的工具</text>
    </g>
    <line x1="180" y1="105" x2="180" y2="125" class="arrow"/>
    <g transform="translate(40, 130)">
      <rect width="280" height="50" rx="6" fill="#3b0764" stroke="#a78bfa" stroke-width="1"/>
      <text x="140" y="22" class="box-title" text-anchor="middle">2. 執行器 (Executor Step)</text>
      <text x="140" y="38" class="box-desc" text-anchor="middle">平行扇出呼叫工具並彙整標準化證據</text>
    </g>
    <line x1="180" y1="180" x2="180" y2="200" class="arrow"/>
    <g transform="translate(40, 205)">
      <rect width="280" height="50" rx="6" fill="#3b0764" stroke="#a78bfa" stroke-width="1"/>
      <text x="140" y="22" class="box-title" text-anchor="middle">3. 最終合成 (Synthesis Step)</text>
      <text x="140" y="38" class="box-desc" text-anchor="middle">由 LLM 產出完整回答並附帶引用出處</text>
    </g>
  </g>
</svg>
